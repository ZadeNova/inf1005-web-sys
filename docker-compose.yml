version: "3.8"

services:
  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: web_sys_php
    volumes:
      - ./backend:/var/www/backend
      - ./public:/var/www/public
    command: sh -c "cd /var/www/backend && composer install && php-fpm"
    networks:
      - web_sys_network

  nginx:
    image: nginx:alpine
    container_name: web_sys_nginx
    ports:
      - "8000:80"
    volumes:
      - ./backend:/var/www/backend
      - ./public:/var/www/public
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
    networks:
      - web_sys_network

  frontend:
    image: node:20-alpine
    container_name: web_sys_frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "3000:3000"
    command: sh -c "npm install && npm run dev -- --host"
    depends_on:
      - nginx
    networks:
      - web_sys_network

networks:
  web_sys_network:
    driver: bridge
