version: "3.8"

services:
  mysql:
    image: mysql:8.0
    container_name: web_sys_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: vapourft
      MYSQL_USER: vapourft_user
      MYSQL_PASSWORD: vapourft_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - web_sys_network
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "localhost",
          "-u",
          "root",
          "-prootpass",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: web_sys_php
    volumes:
      - ./backend:/var/www/backend:z
      - ./public:/var/www/public:z
    command: sh -c "cd /var/www/backend && composer install && php-fpm"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - web_sys_network

  nginx:
    image: nginx:alpine
    container_name: web_sys_nginx
    ports:
      - "8000:80"
    volumes:
      - ./backend:/var/www/backend
      - ./public:/var/www/public
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:z
    depends_on:
      - php
    networks:
      - web_sys_network

  frontend:
    image: node:20-alpine
    container_name: web_sys_frontend
    working_dir: /app
    volumes:
      - ./frontend:/app:z
    ports:
      - "3000:3000"
    command: sh -c "npm install && npm run dev -- --host"
    depends_on:
      - nginx
    networks:
      - web_sys_network

networks:
  web_sys_network:
    driver: bridge

volumes:
  mysql_data:
