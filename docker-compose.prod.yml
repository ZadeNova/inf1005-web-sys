services:
  mysql:
    image: mysql:8.0
    container_name: web_sys_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database:/docker-entrypoint-initdb.d:z
    networks:
      - web_sys_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5

  apache:
    build:
      context: .
      dockerfile: docker/apache/Dockerfile
    container_name: web_sys_apache
    restart: unless-stopped
    ports:
      - "80:80"
    environment:
      DB_HOST: mysql
      DB_NAME: ${MYSQL_DATABASE}
      DB_USER: ${MYSQL_USER}
      DB_PASS: ${MYSQL_PASSWORD}
    volumes:
      - /home/vapour-dev/uploads:/var/www/public/images/assets/uploads
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - web_sys_network

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: web_sys_phpmyadmin
    ports:
      - "8080:80"
    environment:
      PMA_HOST: mysql
      PMA_USER: ${MYSQL_USER}
      PMA_PASSWORD: ${MYSQL_PASSWORD}
      PMA_ARBITRARY: 1
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - web_sys_network

networks:
  web_sys_network:
    driver: bridge

volumes:
  mysql_data: